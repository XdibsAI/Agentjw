name: AgentJW CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black mypy
    
    - name: Lint with flake8
      run: |
        flake8 sicuan/ core/ --count --max-complexity=10 --statistics
    
    - name: Format with black
      run: |
        black --check sicuan/ core/
    
    - name: Type check with mypy
      run: |
        mypy sicuan/ core/ --ignore-missing-imports || true
    
    - name: Run unit tests with coverage
      run: |
        pytest tests/unit/ -v --cov=sicuan --cov=core --cov-report=xml --cov-report=html
    
    - name: Run regression suite
      run: |
        python3 tests/regression/suite.py
    
    - name: Security scan
      run: |
        pip install bandit
        bandit -r sicuan/ core/ -f json -o bandit-report.json || true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          coverage.xml
          htmlcov/
          bandit-report.json

  health-check:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Start API server
      run: |
        python3 api_server.py &
        sleep 5
    
    - name: Health check
      run: |
        curl -f http://localhost:18791/health || exit 1

  build:
    runs-on: ubuntu-latest
    needs: [test, health-check]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Build package
      run: |
        python -m pip install --upgrade pip
        pip install build
        python -m build
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
