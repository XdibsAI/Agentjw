name: AgentJW CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black mypy

      - name: Lint with flake8
        run: |
          flake8 sicuan/ core/ --count --max-complexity=10 --statistics --exit-zero

      - name: Format with black
        run: |
          black --check sicuan/ core/ || true

      - name: Type check with mypy
        run: |
          mypy sicuan/ core/ --ignore-missing-imports || true

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --cov=sicuan --cov=core --cov-report=xml --cov-report=html -m "not network" -m "not network"

      - name: Run regression suite
        run: |
          echo "=== RUNNING REGRESSION SUITE ===" && SKIP_API_TESTS=1 python3 tests/regression/suite.py

      - name: Security scan
        run: |
          pip install bandit
          bandit -r sicuan/ core/ -f json -o bandit-report.json || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage.xml
            htmlcov/
            bandit-report.json

  health-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Start API server
        run: |
          python3 api_server.py &
          sleep 5

      - name: Health check
        run: |
          curl -f http://localhost:18791/health || echo "Health check failed, but continuing..."

  build:
    runs-on: ubuntu-latest
    needs: [test, health-check]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
